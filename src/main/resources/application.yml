spring:
  datasource:
    url: jdbc:oracle:thin:@clouddb_high
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    # ── HikariCP 커넥션 풀 ─────────────────────────────────────────────────
    hikari:
      maximum-pool-size: 10          # 최대 커넥션 수 (CPU 코어 수 * 2 + 1 기준)
      minimum-idle: 5                # 최소 유휴 커넥션
      connection-timeout: 30000      # 커넥션 획득 대기 최대 30초
      idle-timeout: 600000           # 유휴 커넥션 유지 최대 10분
      max-lifetime: 1800000          # 커넥션 최대 수명 30분 (Oracle 세션 timeout보다 짧게)
      leak-detection-threshold: 60000 # 60초 이상 반납 안 되면 leak 경고

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        default_schema: ${DB_USERNAME}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 21002
  tomcat:
    uri-encoding: UTF-8
    max-http-form-post-size: 2MB    # form POST 요청 크기 제한
  servlet:
    session:
      timeout: 2h                   # 세션 유효 시간 2시간
      cookie:
        http-only: true
        same-site: lax
  # ── 에러 응답 정보 최소화 ────────────────────────────────────────────────
  error:
    include-message: never          # 에러 message 필드 숨김
    include-stacktrace: never       # 스택트레이스 절대 노출 금지
    include-exception: false        # exception 클래스명 숨김
    include-binding-errors: never   # validation 바인딩 에러 상세 숨김

# ── Actuator 엔드포인트 보안 ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # health만 외부 허용, 나머지는 모두 차단
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never           # 운영 환경: DB 커넥션 상태 등 내부 정보 숨김
  server:
    port: 21003                     # Actuator 전용 포트 분리 (docker-compose에서 외부 미노출)

# ── 로깅 레벨 운영 수준 ───────────────────────────────────────────────────
logging:
  level:
    root: WARN                      # 기본은 WARN
    dev.sweetme: INFO               # 애플리케이션 로그는 INFO
    org.hibernate.SQL: WARN         # SQL 로그 최소화
    org.springframework.web: WARN
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN         # HikariCP 상태 로그
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  page:
    review-size: 15
    room-size: 10
    community-size: 15
  cors:
    # 허용할 Origin 목록 (쉼표 구분). 환경변수 CORS_ORIGINS으로 오버라이드 가능.
    allowed-origins: ${CORS_ORIGINS:https://sweetme.kro.kr}
  oci:
    config-file: ~/.oci/config
    profile: DEFAULT
    namespace: axw45xvpnfol
    bucket: MyBucket
    region: ap-chuncheon-1
