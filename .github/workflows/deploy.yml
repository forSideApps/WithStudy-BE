name: Build & Deploy Backend

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/forsideapps/withstudy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1
        env:
          DB_USERNAME:   ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          WALLET_BASE64: ${{ secrets.WALLET_BASE64 }}
          OCI_BASE64:    ${{ secrets.OCI_BASE64 }}
          GHCR_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:     ${{ github.actor }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_KEY }}
          envs: DB_USERNAME,DB_PASSWORD,WALLET_BASE64,OCI_BASE64,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            APP_DIR=/home/ubuntu/withstudy

            mkdir -p $APP_DIR/backend/wallet
            echo "$WALLET_BASE64" | base64 -d | tar -xz -C $APP_DIR/backend/
            printf 'WALLET_LOCATION = (SOURCE = (METHOD = file) (METHOD_DATA = (DIRECTORY="/wallet")))\nSSL_SERVER_DN_MATCH=yes\n' > $APP_DIR/backend/wallet/sqlnet.ora

            mkdir -p $APP_DIR/oci
            echo "$OCI_BASE64" | base64 -d | tar -xz -C $APP_DIR/oci/
            sed -i 's|key_file=.*|key_file=/root/.oci/oci_api_key.pem|' $APP_DIR/oci/config

            printf 'DB_USERNAME=%s\nDB_PASSWORD=%s\n' "$DB_USERNAME" "$DB_PASSWORD" > $APP_DIR/.env

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker compose -f $APP_DIR/docker-compose.prod.yml up -d --no-deps app

            docker image prune -f
